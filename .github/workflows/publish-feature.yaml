name: Publish Devcontainer Feature

on:
  push:
    tags:
      - 'feature-v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (skip actual publish)'
        type: boolean
        default: false

jobs:
  # Fast manifest and version validation (~1 min)
  validate:
    name: Validate Manifest
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract feature version from tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/feature-v')
        id: version
        run: |
          TAG=${GITHUB_REF#refs/tags/feature-v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Feature version: $TAG"

      - name: Verify feature manifest exists
        run: |
          if [ ! -f src/whitepaper-converter/devcontainer-feature.json ]; then
            echo "ERROR: Feature manifest not found"
            exit 1
          fi
          echo "Feature manifest found"

      - name: Validate feature manifest JSON
        run: |
          cat src/whitepaper-converter/devcontainer-feature.json | jq empty
          echo "Feature manifest is valid JSON"

      - name: Check feature version is valid semver
        run: |
          MANIFEST_VERSION=$(jq -r .version src/whitepaper-converter/devcontainer-feature.json)
          if ! [[ "$MANIFEST_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version format: $MANIFEST_VERSION"
            exit 1
          fi
          echo "Version is valid: $MANIFEST_VERSION"

      - name: Check feature version matches tag
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/feature-v')
        run: |
          MANIFEST_VERSION=$(jq -r .version src/whitepaper-converter/devcontainer-feature.json)
          TAG_VERSION="${{ steps.version.outputs.version }}"

          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Version mismatch!"
            echo "  Tag version:      $TAG_VERSION"
            echo "  Manifest version: $MANIFEST_VERSION"
            exit 1
          fi

          echo "Version matches: $MANIFEST_VERSION"

  # Publish to GitHub Container Registry
  # Tests are not re-run here — they already passed on the PR and push-to-main
  # that produced the commit this tag points to.
  publish:
    name: Publish to GHCR
    runs-on: ubuntu-latest
    needs: [validate]
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Extract feature version
        id: version
        run: |
          VERSION=$(jq -r .version src/whitepaper-converter/devcontainer-feature.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Feature version: $VERSION"

      - name: Log in to GitHub Container Registry
        if: inputs.dry_run != true
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bundle scripts and converter into feature
        uses: ./.github/actions/bundle-feature

      # oci-registry is just the registry host. The devcontainers/action
      # automatically appends github.repository as the namespace, producing:
      # ghcr.io/{owner}/{repo}/{feature-id}
      - name: Publish devcontainer feature
        if: inputs.dry_run != true
        uses: devcontainers/action@1082abd5d2bf3a11abccba70eef98df068277772 # v1.4.3
        with:
          publish-features: true
          base-path-to-features: src
          oci-registry: ghcr.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Dry run - skip publish
        if: inputs.dry_run == true
        run: |
          echo "DRY RUN MODE - Skipping actual publish"
          echo "Would publish feature to:"
          echo "  Registry: ghcr.io/${{ github.repository }}"
          echo "  Feature: whitepaper-converter"
          echo "  Version: ${{ steps.version.outputs.version }}"

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/feature-v') && inputs.dry_run != true
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          body: |
            ## Feature Published Successfully

            **Feature**: whitepaper-converter
            **Version**: ${{ steps.version.outputs.version }}
            **Registry**: ghcr.io/${{ github.repository }}

            ### Usage

            Add to your `.devcontainer/devcontainer.json`:

            ```json
            {
              "features": {
                "ghcr.io/${{ github.repository }}/whitepaper-converter:${{ steps.version.outputs.version }}": {
                  "latexEngine": "tectonic"
                }
              }
            }
            ```

            ### Options

            - `latexEngine`: tectonic (default), pdflatex, xelatex, lualatex
            - `installPath`: Directory to install the converter tool (default: /usr/local/lib/cosai-converter)
            - `skipChromium`: Skip Chromium configuration (default: false)
            - `skipPython`: Skip Python installation (default: false)
            - `skipNode`: Skip Node.js installation (default: false)

            After installation, use `cosai-convert` to convert documents:
            ```bash
            cosai-convert input.md output.pdf
            ```

            ### Links

            - [Feature Source](https://github.com/${{ github.repository }}/tree/main/src/whitepaper-converter)
            - [Documentation](https://github.com/${{ github.repository }}/blob/main/src/whitepaper-converter/README.md)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Notify on completion
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate, publish]
    if: always()
    steps:
      - name: Check workflow status
        run: |
          if [ "${{ needs.validate.result }}" != "failure" ] && \
             [ "${{ needs.validate.result }}" != "cancelled" ] && \
             [ "${{ needs.publish.result }}" != "failure" ] && \
             [ "${{ needs.publish.result }}" != "cancelled" ]; then
            echo "SUCCESS: Feature published successfully"
            echo "status=success" >> $GITHUB_ENV
            echo "exit_code=0" >> $GITHUB_ENV
          else
            echo "FAILURE: Workflow failed"
            echo "  Validate result:  ${{ needs.validate.result }}"
            echo "  Publish result:   ${{ needs.publish.result }}"
            echo "status=failure" >> $GITHUB_ENV
            echo "exit_code=1" >> $GITHUB_ENV
          fi

      - name: Summary
        if: always()
        run: |
          if [ "${{ env.status }}" = "success" ]; then
            echo "✅ Devcontainer feature published successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "View the published feature at:" >> $GITHUB_STEP_SUMMARY
            echo "https://github.com/${{ github.repository }}/pkgs/container/whitepaper-converter" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Feature publish failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Exit with failure if workflow failed
        if: env.exit_code == '1'
        run: exit 1
