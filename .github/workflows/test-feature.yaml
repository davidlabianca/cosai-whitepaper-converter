name: Test Devcontainer Feature

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'scripts/**'
      - 'convert.py'
      - 'assets/**'
      - '.github/workflows/test-feature.yaml'
      - '.github/actions/bundle-feature/action.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'scripts/**'
      - 'convert.py'
      - 'assets/**'
      - '.github/workflows/test-feature.yaml'
      - '.github/actions/bundle-feature/action.yaml'
  workflow_call:

permissions:
  contents: read

concurrency:
  group: test-feature-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-scenarios:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Bundle scripts and converter into feature
        uses: ./.github/actions/bundle-feature

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli@0.83.3

      - name: Test feature scenarios
        run: devcontainer features test -f whitepaper-converter --skip-autogenerated --skip-duplicated .
