name: Test Devcontainer Feature

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'test/**'
      - 'convert.py'
      - 'assets/**'
      - '.github/workflows/test-feature.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'test/**'
      - 'convert.py'
      - 'assets/**'
      - '.github/workflows/test-feature.yaml'
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bundle scripts and converter into feature
        uses: ./.github/actions/bundle-feature

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test feature scenarios
        run: devcontainer features test -f whitepaper-converter --skip-autogenerated --skip-duplicated .

  test-base-image:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bundle scripts and converter into feature
        uses: ./.github/actions/bundle-feature

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test on Ubuntu base image
        run: devcontainer features test --skip-scenarios -f whitepaper-converter -i mcr.microsoft.com/devcontainers/base:ubuntu .
