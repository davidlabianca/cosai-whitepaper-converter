name: Test Devcontainer Feature

on:
  push:
    branches:
      - main
      - feature/**
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'test/**'
      - 'convert.py'
      - 'assets/**'
      - '.github/workflows/test-feature.yaml'
  pull_request:
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'test/**'
      - 'convert.py'
      - 'assets/**'
      - '.github/workflows/test-feature.yaml'
  workflow_call:

jobs:
  test-scenarios:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bundle scripts and converter into feature
        run: |
          mkdir -p src/whitepaper-converter/scripts
          cp scripts/install-deps.sh src/whitepaper-converter/scripts/
          cp scripts/verify-deps.sh src/whitepaper-converter/scripts/
          cp scripts/configure-chromium.sh src/whitepaper-converter/scripts/
          mkdir -p src/whitepaper-converter/converter/assets
          cp convert.py src/whitepaper-converter/converter/
          cp requirements.txt package.json src/whitepaper-converter/converter/
          cp assets/config.json assets/puppeteerConfig.json assets/cosai-template.tex assets/cosai.sty assets/cosai-logo.png assets/background.pdf "assets/CoSAI(Light).pdf" src/whitepaper-converter/converter/assets/

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test feature scenarios
        run: devcontainer features test -f whitepaper-converter --skip-autogenerated --skip-duplicated .

  test-base-image:
    runs-on: ubuntu-latest
    continue-on-error: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bundle scripts and converter into feature
        run: |
          mkdir -p src/whitepaper-converter/scripts
          cp scripts/install-deps.sh src/whitepaper-converter/scripts/
          cp scripts/verify-deps.sh src/whitepaper-converter/scripts/
          cp scripts/configure-chromium.sh src/whitepaper-converter/scripts/
          mkdir -p src/whitepaper-converter/converter/assets
          cp convert.py src/whitepaper-converter/converter/
          cp requirements.txt package.json src/whitepaper-converter/converter/
          cp assets/config.json assets/puppeteerConfig.json assets/cosai-template.tex assets/cosai.sty assets/cosai-logo.png assets/background.pdf "assets/CoSAI(Light).pdf" src/whitepaper-converter/converter/assets/

      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli

      - name: Test on Ubuntu base image
        run: devcontainer features test --skip-scenarios -f whitepaper-converter -i mcr.microsoft.com/devcontainers/base:ubuntu .

