name: Test Install Scripts

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/test-install.yaml'
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/test-install.yaml'
  workflow_dispatch:
    inputs:
      run_macos:
        description: 'Run macOS install tests'
        type: boolean
        default: false
  workflow_call:
    inputs:
      run_macos:
        description: 'Run macOS install tests'
        type: boolean
        default: false

concurrency:
  group: test-install-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Test verify-deps.sh detects missing deps
        run: |
          # Should fail on clean runner (detects missing dependencies)
          if bash ./scripts/verify-deps.sh; then
            echo "ERROR: Expected failure on clean system (missing dependencies)"
            exit 1
          fi
          echo "SUCCESS: verify-deps.sh correctly detected missing dependencies"

  test-install-ubuntu:
    runs-on: ubuntu-latest
    needs: test-verify
    timeout-minutes: 30
    strategy:
      matrix:
        engine: [tectonic, pdflatex]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run install script
        run: LATEX_ENGINE=${{ matrix.engine }} bash ./scripts/install-deps.sh

      - name: Verify installation
        run: LATEX_ENGINE=${{ matrix.engine }} bash ./scripts/verify-deps.sh

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        # install-deps.sh only installs python-frontmatter for root users (no venv).
        # Full requirements.txt (pytest, ruff, etc.) must be installed separately in CI.
        run: pip install -r requirements.txt

      - name: Test conversion
        run: |
          echo '---
          title: Test Document
          author: Test Author
          date: 2025-01-29
          ---
          # Hello World

          This is a test document.

          ## Section 1

          Testing basic conversion.
          ' > /tmp/test.md
          LATEX_ENGINE=${{ matrix.engine }} python convert.py /tmp/test.md /tmp/test.pdf

      - name: Verify PDF was created
        run: |
          if [ ! -f /tmp/test.pdf ]; then
            echo "ERROR: PDF was not created"
            exit 1
          fi
          size=$(stat -c%s /tmp/test.pdf 2>/dev/null || stat -f%z /tmp/test.pdf)
          if [ "$size" -lt 1024 ]; then
            echo "ERROR: PDF is too small ($size bytes)"
            exit 1
          fi
          echo "SUCCESS: PDF created ($size bytes)"

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: conversion-failure-${{ matrix.engine }}
          path: |
            /tmp/test.md
            /tmp/test.pdf
          if-no-files-found: ignore

  # macOS tests are expensive (~30 min each) and rarely needed.
  # Disabled by default. Enable via:
  #   - PR label: add 'test-macos' to the pull request
  #   - Manual run: Actions → "Run workflow" → check "Run macOS install tests"
  #   - Caller workflow: pass run_macos: true via workflow_call
  test-install-macos:
    if: inputs.run_macos || contains(github.event.pull_request.labels.*.name, 'test-macos')
    runs-on: macos-latest
    needs: test-verify
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run install script
        run: bash ./scripts/install-deps.sh

      - name: Verify installation
        run: bash ./scripts/verify-deps.sh

  test-install-macos-arm64:
    if: inputs.run_macos || contains(github.event.pull_request.labels.*.name, 'test-macos')
    runs-on: macos-14
    needs: test-verify
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run install script
        run: bash ./scripts/install-deps.sh

      - name: Verify installation
        run: bash ./scripts/verify-deps.sh
